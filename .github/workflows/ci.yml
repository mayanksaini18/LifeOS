name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      # Informational only for now: the repo has a few pre-existing lint errors
      # in unrelated files. Don't block merges on them, but keep them visible.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
